<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Flower Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Iris Flower Prediction</h1>
        <p>Enter the flower's features to predict its species.</p>

        <form action="/predict" method="post">
            <label>Sepal Length:</label>
            <input type="text" name="sepal_length" required>
            
            <label>Sepal Width:</label>
            <input type="text" name="sepal_width" required>
            
            <label>Petal Length:</label>
            <input type="text" name="petal_length" required>
            
            <label>Petal Width:</label>
            <input type="text" name="petal_width" required>
            
            <button type="submit">Predict</button>
        </form>

        {% if prediction_text %}
            <div class="result">{{ prediction_text }}</div>
        {% endif %}
    </div>
</body>
</html>
